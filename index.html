<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시니어 AI 전문가 과정</title>

  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}
    (window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');

    fbq('init', '2064515254114114'); 
    fbq('track', 'PageView');
  </script>
  <noscript>
    <img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=2064515254114114&ev=PageView&noscript=1"/>
  </noscript>

  <script src="https://karrot-pixel.business.daangn.com/karrot-pixel.js"></script>
  <script>
    window.karrotPixel.init('1777342301226414001');
    window.karrotPixel.track('ViewPage');
  </script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      font-family: sans-serif;
      padding-bottom: 100px; /* 버튼 공간 확보 */
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    .landing-image {
      width: 100%;
      display: block;
    }
    
    /* 하단 버튼 바 컨테이너 */
    .cta-container {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 600px;
      padding: 15px 10px 25px 10px;
      background: rgba(255, 255, 255, 0.95);
      display: flex;
      gap: 10px; /* 버튼 사이 간격 */
      box-sizing: border-box;
      z-index: 999;
      box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
    }
    
    .cta-button {
      flex: 1; /* 가로로 동일한 비율 배정 */
      padding: 18px 5px;
      font-size: 17px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      text-align: center;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 무료 설명회 버튼 (왼쪽) */
    .btn-seminar {
      background-color: #4a4a4a;
      color: white;
    }

    /* 과정 신청 버튼 (오른쪽) */
    .btn-course {
      background-color: #ff3b30;
      color: white;
    }

    /* 실시간 마케팅 알림 팝업 스타일 */
    .custom-toast {
      position: fixed;
      bottom: 95px; /* 하단 고정 버튼 바 바로 위에 띄움 */
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      width: calc(100% - 30px);
      max-width: 570px;
      background-color: rgba(30, 30, 30, 0.95); /* 가독성 높은 다크 테마 */
      color: #ffffff;
      padding: 14px 20px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      z-index: 1000;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      opacity: 0;
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none; /* 유저의 이미지 클릭/스크롤 방해 금지 */
      box-sizing: border-box;
    }

    /* 팝업 활성화 효과 */
    .custom-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 숫자 강조 색상 */
    .toast-num-course {
      color: #ff453a; /* 전문가 과정 포인트 컬러 (레드) */
    }
    .toast-num-seminar {
      color: #ff9f0a; /* 무료 설명회 포인트 컬러 (오렌지) */
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="landing.png" alt="시니어 AI 전문가 과정" class="landing-image">
  </div>

  <!-- 자바스크립트가 제어할 팝업 레이어 -->
  <div id="toastPopup" class="custom-toast"></div>

  <div class="cta-container">
    <button class="cta-button btn-seminar" onclick="trackAndGo('seminar')">
      무료 설명회 신청
    </button>
    <button class="cta-button btn-course" onclick="trackAndGo('course')">
      전문가 과정 신청
    </button>
  </div>

  <script>
    // 기존 페이지 이동 및 트래킹 함수
    function trackAndGo(type) {
      var targetUrl = "";
      
      if (type === 'seminar') {
        targetUrl = "https://forms.gle/jTNKdMQcdViRJQX17";
        if (typeof fbq === 'function') {
          fbq('track', 'Lead', { content_name: 'Seminar' });
        }
        if (window.karrotPixel) {
          window.karrotPixel.track('Purchase');
        }
      } else {
        targetUrl = "https://forms.gle/tNkNTsZeFrFTf9Pi9";
        if (typeof fbq === 'function') {
          fbq('track', 'Purchase', { content_name: 'Course' });
        }
        if (window.karrotPixel) {
          window.karrotPixel.track('Purchase');
        }
      }

      setTimeout(function() {
        window.location.href = targetUrl;
      }, 300);
    }

    // 시니어 배려형 여유로운 로테이션 알림 로직
    document.addEventListener("DOMContentLoaded", function() {
      var currentHour = new Date().getHours();
      
      // 새롭게 요청하신 인원 기준 세팅 (과정 1~2, 설명회 1~3)
      var finalCourseCount = 1;  // 전문가 과정 기본값
      var finalSeminarCount = 1; // 무료 설명회 기본값

      // 시간대별 자연스러운 흐름 분배
      if (currentHour >= 12 && currentHour < 17) {
        // 오후 시간대 (12시 ~ 17시 전)
        finalCourseCount = 1;
        finalSeminarCount = 2;
      } else if (currentHour >= 17) {
        // 저녁 및 밤 시간대 (17시 이후 최고치 도달)
        finalCourseCount = 2;  // 최대 2명 제한
        finalSeminarCount = 3; // 최대 3명 제한
      }

      var toast = document.getElementById("toastPopup");

      // [1단계] 진입 3초 후: '전문가 과정' 팝업 노출
      setTimeout(function() {
        toast.innerHTML = "오늘 전문가 과정 <span class='toast-num-course'>" + finalCourseCount + "명</span> 신청 완료! 🎉";
        toast.classList.add("show");
      }, 3000);

      // [2단계] 진입 10초 후: 첫 팝업 제거 (시니어를 위해 '7초 동안' 넉넉하게 노출)
      setTimeout(function() {
        toast.classList.remove("show");
      }, 10000);

      // [3단계] 진입 12.5초 후: '무료 설명회' 팝업 순차 노출 (2.5초 여백 제공)
      setTimeout(function() {
        toast.innerHTML = "오늘 무료 설명회 <span class='toast-num-seminar'>" + finalSeminarCount + "명</span> 신청 완료! 👍";
        toast.classList.add("show");
      }, 12500);

      // [4단계] 진입 19.5초 후: 두 번째 팝업 최종 제거 ('7초 동안' 넉넉하게 노출)
      setTimeout(function() {
        toast.classList.remove("show");
      }, 19500);
    });
  </script>

</body>
</html>
