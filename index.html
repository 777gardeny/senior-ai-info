<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시니어 AI 전문가 과정</title>

  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}
    (window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');

    fbq('init', '2064515254114114'); 
    fbq('track', 'PageView');
  </script>
  <noscript>
    <img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=2064515254114114&ev=PageView&noscript=1"/>
  </noscript>

  <script src="https://karrot-pixel.business.daangn.com/karrot-pixel.js"></script>
  <script>
    window.karrotPixel.init('1777342301226414001');
    window.karrotPixel.track('ViewPage');
  </script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      font-family: sans-serif;
      padding-bottom: 100px; /* 버튼 공간 확보 */
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    .landing-image {
      width: 100%;
      display: block;
    }
    
    /* 하단 버튼 바 컨테이너 */
    .cta-container {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 600px;
      padding: 15px 10px 25px 10px;
      background: rgba(255, 255, 255, 0.95);
      display: flex;
      gap: 10px; /* 버튼 사이 간격 */
      box-sizing: border-box;
      z-index: 999;
      box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
    }
    
    .cta-button {
      flex: 1; /* 가로로 동일한 비율 배정 */
      padding: 18px 5px;
      font-size: 17px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      text-align: center;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 무료 설명회 버튼 (왼쪽) */
    .btn-seminar {
      background-color: #4a4a4a;
      color: white;
    }

    /* 과정 신청 버튼 (오른쪽) */
    .btn-course {
      background-color: #ff3b30;
      color: white;
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="landing.png" alt="시니어 AI 전문가 과정" class="landing-image">
  </div>

  <div class="cta-container">
    <button class="cta-button btn-seminar" onclick="trackAndGo('seminar')">
      무료 설명회 신청
    </button>
    <button class="cta-button btn-course" onclick="trackAndGo('course')">
      전문가 과정 신청
    </button>
  </div>

  <script>
    function trackAndGo(type) {
      var targetUrl = "";
      
      if (type === 'seminar') {
        targetUrl = "https://forms.gle/KvAPNY3GBQ87gDoJ6";
        // 메타 맞춤 전환 전송용 (URL 파라미터 포함)
        if (typeof fbq === 'function') {
          fbq('track', 'Lead', { content_name: 'Seminar' });
        }
        // 당근 구매 이벤트
        if (window.karrotPixel) {
          window.karrotPixel.track('Purchase');
        }
      } else {
        targetUrl = "https://forms.gle/Gaco6JSJsXDHT85k7";
        // 메타 맞춤 전환 전송용
        if (typeof fbq === 'function') {
          fbq('track', 'Purchase', { content_name: 'Course' });
        }
        // 당근 구매 이벤트
        if (window.karrotPixel) {
          window.karrotPixel.track('Purchase');
        }
      }

      // 데이터 전송 누락 방지를 위한 지연 이동
      setTimeout(function() {
        window.location.href = targetUrl;
      }, 300);
    }
  </script>

</body>
</html>
